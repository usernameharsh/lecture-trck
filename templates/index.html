<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 p-8 font-sans">
    
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-indigo-600">My Lecture Tracker</h1>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
            <h2 class="text-lg font-semibold mb-4 text-slate-700">Track a New Course</h2>
            <form action="/add" method="POST" class="flex flex-col sm:flex-row gap-4">
                <input type="text" name="playlist_url" placeholder="Paste YouTube Playlist URL here..." required
                    class="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                <button type="submit" class="bg-slate-900 text-white px-6 py-2 rounded-lg font-medium hover:bg-slate-800 transition shadow-sm">
                    Track Course
                </button>
            </form>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            {% for playlist in playlists %}
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-semibold mb-2 truncate">{{ playlist[1] }}</h2>
                <p class="text-xs text-slate-400 mb-4 font-mono">ID: {{ playlist[0] }}</p>
                
                <div class="bg-slate-100 p-3 rounded-lg mb-4">
                    <p class="text-sm font-medium text-slate-600">Total Raw Seconds:</p>
                    <p class="text-lg font-bold text-slate-800">{{ playlist[2] }}</p>
                </div>

                <a href="/playlist/{{ playlist[0] }}" class="block w-full text-center bg-indigo-500 text-white font-medium py-2 rounded-lg hover:bg-indigo-600 transition mb-2">
                    View ETA & Progress
                </a>
                
                <form action="/delete/{{ playlist[0] }}" method="POST" onsubmit="return confirm('Are you sure you want to delete this course and all its progress?');">
                    <button type="submit" class="w-full bg-red-50 text-red-600 font-medium py-2 rounded-lg hover:bg-red-100 transition border border-red-100">
                        Delete Course
                    </button>
                </form>
            </div>
            
            {% else %}
            <div class="col-span-2 text-center py-10 bg-white rounded-xl border border-dashed border-slate-300">
                <p class="text-slate-500">No playlists tracked yet. Use your CLI to add one!</p>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
