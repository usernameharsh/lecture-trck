<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', }</script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 p-8 font-sans transition-colors duration-200">
    
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600 dark:text-indigo-400">My Lecture Tracker</h1>
            <button onclick="toggleDarkMode()" class="p-2 rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-300 dark:hover:bg-slate-700 transition border border-slate-300 dark:border-slate-700 shadow-sm">
                🌗 Toggle Theme
            </button>
        </div>

        <div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 mb-8 transition-colors">
            <h2 class="text-lg font-semibold mb-4 text-slate-700 dark:text-slate-200">Track a New Course</h2>
            <form action="/add" method="POST" class="flex flex-col sm:flex-row gap-4">
                
                <input type="text" name="playlist_url" placeholder="Paste YouTube Playlist URL here..." required
                    class="flex-1 px-4 py-2 border border-slate-300 dark:border-slate-600 dark:bg-slate-700 rounded-lg focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
                
                <input type="text" name="category" placeholder="Subject (e.g. Math)" required
                    class="w-full sm:w-48 px-4 py-2 border border-slate-300 dark:border-slate-600 dark:bg-slate-700 rounded-lg focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">

                <button type="submit" class="bg-slate-900 dark:bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-slate-800 dark:hover:bg-indigo-500 transition shadow-sm">
                    Track Course
                </button>
            </form>
        </div>

        <div class="flex gap-2 mb-6 overflow-x-auto pb-2" id="filter-container">
            <button onclick="filterCourses('All')" class="filter-btn active bg-slate-800 dark:bg-indigo-500 text-white px-4 py-1.5 rounded-full text-sm font-medium transition whitespace-nowrap">All</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="course-grid">
            {% for playlist in playlists %}
            <div class="playlist-card bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 transition-colors" data-category="{{ playlist[3] }}">
                
                <div class="flex justify-between items-start mb-2">
                    <h2 class="text-xl font-semibold truncate pr-2 dark:text-white">{{ playlist[1] }}</h2>
                    <button type="button" 
                            onclick="editCategory(this.dataset.playlistId, this.dataset.category)"
                            data-playlist-id="{{ playlist[0] }}"
                            data-category="{{ playlist[3] }}"
                            title="Edit Category"
                            class="relative z-10 flex items-center gap-1 px-2 py-1 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-800 dark:text-indigo-300 text-xs font-bold rounded hover:bg-indigo-200 dark:hover:bg-indigo-800 transition cursor-pointer border border-transparent hover:border-indigo-300 dark:hover:border-indigo-600">
                        {{ playlist[3] }} <span class="opacity-70 text-[10px] pointer-events-none">✎</span>
                    </button>
                </div>
                
                <p class="text-xs text-slate-400 mb-4 font-mono">ID: {{ playlist[0] }}</p>
                
                <div class="bg-slate-100 dark:bg-slate-700/50 p-3 rounded-lg mb-4 transition-colors">
                    <p class="text-sm font-medium text-slate-600 dark:text-slate-400">Total Raw Seconds:</p>
                    <p class="text-lg font-bold text-slate-800 dark:text-slate-200">{{ playlist[2] }}</p>
                </div>

                <a href="/playlist/{{ playlist[0] }}" class="block w-full text-center bg-indigo-500 text-white font-medium py-2 rounded-lg hover:bg-indigo-600 transition mb-2 shadow-sm">
                    View ETA & Progress
                </a>
                
                <form action="/delete/{{ playlist[0] }}" method="POST" onsubmit="return confirm('Are you sure you want to delete this course and all its progress?');">
                    <button type="submit" class="w-full bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 font-medium py-2 rounded-lg hover:bg-red-100 dark:hover:bg-red-900/40 transition border border-red-100 dark:border-red-900/50">
                        Delete Course
                    </button>
                </form>
            </div>
            {% else %}
            <div class="col-span-2 text-center py-10 bg-white dark:bg-slate-800 rounded-xl border border-dashed border-slate-300 dark:border-slate-600 transition-colors">
                <p class="text-slate-500 dark:text-slate-400">No playlists tracked yet.</p>
            </div>
            {% endfor %}
        </div>
    </div>

    <div id="category-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-50 px-4" role="dialog" aria-modal="true" aria-labelledby="category-modal-title">
        <div class="w-full max-w-md bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-slate-200 dark:border-slate-700 p-5">
            <h3 id="category-modal-title" class="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-2">Edit Category</h3>
            <p class="text-sm text-slate-600 dark:text-slate-300 mb-4">Set a new subject category for this course.</p>
            <input id="category-modal-input" type="text" placeholder="Subject (e.g. Math)"
                   class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 dark:bg-slate-700 rounded-lg focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors mb-4">
            <div class="flex justify-end gap-2">
                <button id="category-modal-cancel" type="button" class="px-4 py-2 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-600 transition">Cancel</button>
                <button id="category-modal-save" type="button" class="px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-500 transition">Save</button>
            </div>
        </div>
    </div>

    <script>
    let categoryEditState = null;

    // Theme Engine
    function toggleDarkMode() {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }

    // Filter Engine
    function filterCourses(category) {
        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.innerText === category) {
                btn.className = 'filter-btn bg-slate-800 dark:bg-indigo-500 text-white px-4 py-1.5 rounded-full text-sm font-medium transition whitespace-nowrap';
            } else {
                btn.className = 'filter-btn bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-300 dark:hover:bg-slate-600 px-4 py-1.5 rounded-full text-sm font-medium transition whitespace-nowrap';
            }
        });
        document.querySelectorAll('.playlist-card').forEach(card => {
            card.style.display = (category === 'All' || card.getAttribute('data-category') === category) ? 'block' : 'none';
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
        const categories = new Set();
        document.querySelectorAll('.playlist-card').forEach(card => categories.add(card.getAttribute('data-category')));
        
        const container = document.getElementById('filter-container');
        categories.forEach(cat => {
            if(cat && cat !== "None") {
                const btn = document.createElement('button');
                btn.className = 'filter-btn bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-300 dark:hover:bg-slate-600 px-4 py-1.5 rounded-full text-sm font-medium transition whitespace-nowrap';
                btn.innerText = cat;
                btn.onclick = () => filterCourses(cat);
                container.appendChild(btn);
            }
        });

        const modal = document.getElementById('category-modal');
        const cancelBtn = document.getElementById('category-modal-cancel');
        const saveBtn = document.getElementById('category-modal-save');
        const input = document.getElementById('category-modal-input');

        const closeModal = () => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            categoryEditState = null;
        };

        cancelBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (event) => {
            if (event.target === modal) {
                closeModal();
            }
        });

        saveBtn.addEventListener('click', () => {
            if (!categoryEditState) {
                return;
            }

            const value = input.value.trim();
            if (!value || value === categoryEditState.currentCategory) {
                closeModal();
                return;
            }

            updateCategory(categoryEditState.playlistId, value);
        });

        input.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                saveBtn.click();
            }
            if (event.key === 'Escape') {
                event.preventDefault();
                closeModal();
            }
        });
    });

    function openCategoryModal(playlistId, currentCategory) {
        const modal = document.getElementById('category-modal');
        const input = document.getElementById('category-modal-input');

        categoryEditState = { playlistId, currentCategory };
        input.value = currentCategory || '';

        modal.classList.remove('hidden');
        modal.classList.add('flex');
        requestAnimationFrame(() => input.focus());
    }

    function updateCategory(playlistId, newCategory) {
        fetch('/update_category', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                playlist_id: playlistId,
                category: newCategory
            })
        }).then(() => {
            window.location.reload();
        });
    }

    // Category Editing Engine
    function editCategory(playlistId, currentCategory) {
        try {
            const newCat = prompt("Enter a new subject category for this course:", currentCategory);

            if (newCat && newCat.trim() !== "" && newCat.trim() !== currentCategory) {
                updateCategory(playlistId, newCat.trim());
            }
        } catch (_error) {
            // Some embedded browsers do not support prompt(); use in-page modal instead.
            openCategoryModal(playlistId, currentCategory);
        }
    }
    </script>
</body>
</html>
